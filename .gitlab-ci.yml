stages:
  - validate

variables:
  TF_WORKDIR: "terraform/environments/dev"

validate:
  stage: validate
  image: 
    name: hashicorp/terraform:1.7.5
    entrypoint: [""]
  script:
    - cd "$TF_WORKDIR"
    - terraform init -backend=false
    - terraform fmt -check -recursive
    - terraform validate